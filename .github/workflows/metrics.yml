name: Metrics
on:
  # Schedule updates (every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below allow to run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # Note: It is highly recommended to use a Personal Access Token (PAT) 
          # stored as METRICS_TOKEN in your repository secrets for better performance.
          token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: Umerjamshaid
          template: classic
          base: ""
          config_timezone: Asia/Karachi
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          filename: github-metrics.svg
